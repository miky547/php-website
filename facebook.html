<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <style>

        *{
            box-sizing: border-box;
            font-family: Arial Black;
        }
        form {
            width: 400px;
            padding: 17px;
        }
    input{
            width: 400px;
            margin-top: 12px;
            padding: 9px;
            border-radius: 2px;
            border-width: 1px;
            border-color: blue;
            border-style: solid;
        }

        button{
            background-color: azure;
            border-radius: 100px;
            width: 400px;
            margin-top: 12px;
            padding: 9px;
            border-radius: 12px;
            border-width: 1px;
            border-color: blue;
            border-style: solid;
        }
        .btnfyp{
            background: none;
            border: none;
            font-size: 10px;
            color: blue;
        }
        .li{
            color: white;
            background-color: blue;
        }
        .cna{
            background-color: green;
            width: 50%;
            border-radius: 9px;
            color: white;
            margin-left: 10%;

        }
        .epn{
            color: blue;
        }
        
    </style>
</head>
<body>
    <center><form>
        <h3 ><label for="">Log in to Facebook</label></h3>
        <input type="email" placeholder="Email or phone number" class="epn"/>
        <input type="password" placeholder="password" />
    
   
        <button type="submit" class="li">Log in</button>
        <button class="btnfyp"><u>Forgot password?</u></button>
        <button type="submit" class="cna"> Create new account</button></form></center>
    
</body>
</html>
